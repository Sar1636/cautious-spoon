name: EDT Model Training Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "data/**"
      - "pipelines/**"
      - ".github/workflows/train.yml"
      - "tests/**"

  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      data_version:
        description: "Dataset version to use"
        required: false
        default: "1"
      run_full_pipeline:
        description: "Run full Azure ML pipeline"
        required: false
        default: "true"
        type: boolean

  schedule:
    - cron: "0 2 * * 1"

env:
  PYTHON_VERSION: "3.10"
  MODEL_NAME: "edt-model-japan"

jobs:
  # ── Job 1: Lint & Unit Tests ──────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run flake8 linting
        continue-on-error: true
        run: flake8 src/ api/ pipelines/ --max-line-length=200 --ignore=E501,W503,E221,E241,E402,W292,W291,E301,E302,E303,E711,E712

      - name: Train model for tests
        continue-on-error: true
        run: |
          python src/train.py \
            --data japan_pizza_delivery.csv \
            --output outputs/

      - name: Run unit tests
        continue-on-error: true
        run: pytest tests/ -v --tb=short

  # ── Job 2: Train & Register Model ────────────────────────────────────
  train:
    name: Train & Register Model
    runs-on: ubuntu-latest
    needs: test

    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug secrets
        run: |
          echo "TENANT_ID length: ${#AZURE_TENANT_ID}"
          echo "CLIENT_ID length: ${#AZURE_CLIENT_ID}"
          echo "SUBSCRIPTION_ID length: ${#AZURE_SUBSCRIPTION_ID}"
          echo "RESOURCE_GROUP: $AZURE_RESOURCE_GROUP"
          echo "WORKSPACE: $AZURE_ML_WORKSPACE"
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_ML_WORKSPACE: ${{ secrets.AZURE_ML_WORKSPACE }}

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Submit Azure ML Training Pipeline
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_ML_WORKSPACE: ${{ secrets.AZURE_ML_WORKSPACE }}
          DATA_VERSION: ${{ github.event.inputs.data_version || '1' }}
        run: |
          python pipelines/submit_pipeline.py

      - name: Register model in Azure ML Registry
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_ML_WORKSPACE: ${{ secrets.AZURE_ML_WORKSPACE }}
        run: |
          python pipelines/register_model.py \
            --model_name ${{ env.MODEL_NAME }} \
            --description "Trained from commit ${{ github.sha }}"

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-outputs-${{ github.run_id }}
          path: outputs/
          retention-days: 30

  # ── Job 3: Deploy API ─────────────────────────────────────────────────
  deploy:
    name: Deploy Prediction API
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-outputs-${{ github.run_id }}
          path: outputs/

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ secrets.ACR_LOGIN_SERVER }}/edt-api:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Azure Container Instances
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          dns-name-label: edt-prediction-api
          image: ${{ env.IMAGE_TAG }}
          name: edt-api-container
          location: japaneast
          ports: 8000
          environment-variables: MODEL_PATH=outputs/edt_model.pkl
          registry-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.ACR_USERNAME }}
          registry-password: ${{ secrets.ACR_PASSWORD }}
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
