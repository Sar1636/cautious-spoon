          pip install -r requirements.txt
          pip install pytest flake8

      - run: flake8 src/ api/ pipelines/ --max-line-length=200 || true

      - run: python src/train.py --data japan_pizza_delivery.csv --output outputs/ || true

      - run: pytest tests/ || true

