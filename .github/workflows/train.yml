# ─────────────────────────────
# Job 2: Train
# ─────────────────────────────
train:
  runs-on: ubuntu-latest
  needs: test

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: pip install -r requirements.txt

    # ✅ Azure Login using single secret
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # ✅ Verify login (keep this)
    - name: Verify Azure login
      run: az account show

    # 🚀 Submit training pipeline
    - name: Submit Azure ML Training
      env:
        DATA_VERSION: "1"
      run: python pipelines/submit_pipeline.py

    # 🚀 Register model
    - name: Register Model
      run: |
        python pipelines/register_model.py \
          --model_name ${{ env.MODEL_NAME }}

    - uses: actions/upload-artifact@v4
      with:
        name: outputs
        path: outputs/
  # ─────────────────────────────
  # Job 3: Deploy
  # ─────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: outputs
          path: outputs/

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/edt-api:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          name: edt-api
          image: ${{ env.IMAGE }}
          dns-name-label: edt-api
          location: japaneast
          ports: 8000
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
