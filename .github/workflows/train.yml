name: EDT Model Training Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'data/**'
      - 'pipelines/**'
      - '.github/workflows/train.yml'

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      data_version:
        description: 'Dataset version to use'
        required: false
        default: '1'
      run_full_pipeline:
        description: 'Run full Azure ML pipeline (true) or local test only (false)'
        required: false
        default: 'true'
        type: boolean

  schedule:
    - cron: '0 2 * * 1'   # Every Monday at 2 AM UTC (weekly retrain)

env:
  PYTHON_VERSION: '3.10'
  MODEL_NAME: 'edt-model-japan'

jobs:
  # ── Job 1: Lint & Unit Tests ────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          flake8 src/ api/ pipelines/ \
            --max-line-length=120 \
            --ignore=E501,W503

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

  # ── Job 2: Train on Azure ML ────────────────────────────────────────────────
  train:
    name: Train & Register Model
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'

    environment: production   # requires manual approval for prod deploys

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Submit Azure ML Training Pipeline
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP:  ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_ML_WORKSPACE:    ${{ secrets.AZURE_ML_WORKSPACE }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          DATA_VERSION:          ${{ github.event.inputs.data_version || '1' }}
        run: |
          python pipelines/submit_pipeline.py

      - name: Register model in Azure ML Model Registry
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP:  ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_ML_WORKSPACE:    ${{ secrets.AZURE_ML_WORKSPACE }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          python pipelines/register_model.py \
            --model_name ${{ env.MODEL_NAME }} \
            --description "Trained from commit ${{ github.sha }}"

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-outputs-${{ github.run_id }}
          path: outputs/
          retention-days: 30

      - name: Comment on PR with metrics
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const meta = JSON.parse(fs.readFileSync('outputs/train_metadata.json'));
            const m = meta.metrics;
            const body = `## 🍕 EDT Model Training Results
            | Metric | Value |
            |--------|-------|
            | Model  | ${meta.model_name} |
            | RMSE   | ${m.RMSE.toFixed(1)}s |
            | MAE    | ${m.MAE.toFixed(1)}s |
            | R²     | ${m.R2.toFixed(4)} |
            | MAPE   | ${m.MAPE.toFixed(2)}% |
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ── Job 3: Deploy API ───────────────────────────────────────────────────────
  deploy:
    name: Deploy Prediction API
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-outputs-${{ github.run_id }}
          path: outputs/

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username:     ${{ secrets.ACR_USERNAME }}
          password:     ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Docker image
        run: |
          IMAGE_TAG=${{ secrets.ACR_LOGIN_SERVER }}/edt-api:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Azure Container Instances
        uses: azure/aci-deploy@v1
        with:
          resource-group:    ${{ secrets.AZURE_RESOURCE_GROUP }}
          dns-name-label:    edt-prediction-api
          image:             ${{ env.IMAGE_TAG }}
          name:              edt-api-container
          location:          japaneast
          ports:             8000
          environment-variables: |
            MODEL_PATH=outputs/edt_model.pkl
          registry-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          registry-username:     ${{ secrets.ACR_USERNAME }}
          registry-password:     ${{ secrets.ACR_PASSWORD }}
          azure-credentials:     ${{ secrets.AZURE_CREDENTIALS }}
