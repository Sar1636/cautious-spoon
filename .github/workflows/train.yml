name: EDT Model Training Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.10"
  MODEL_NAME: "edt-model-japan"

jobs:
  # ─────────────────────────────
  # Job 1: Test
  # ─────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install -r requirements.txt
          pip install pytest flake8

      - run: flake8 src/ api/ pipelines/ --max-line-length=200 || true

      - run: |
          python src/train.py --data japan_pizza_delivery.csv --output outputs/ || true

      - run: pytest tests/ || true

  # ─────────────────────────────
  # Job 2: Train
  # ─────────────────────────────
  train:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install -r requirements.txt

      # ✅ OIDC LOGIN (no secrets needed except IDs)
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: federated

      # ✅ sanity check
      - name: Verify Azure login
        run: az account show

      - name: Submit Azure ML Training
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_ML_WORKSPACE: ${{ secrets.AZURE_ML_WORKSPACE }}
        run: |
          python pipelines/submit_pipeline.py

      - name: Register Model
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_ML_WORKSPACE: ${{ secrets.AZURE_ML_WORKSPACE }}
        run: |
          python pipelines/register_model.py \
            --model_name ${{ env.MODEL_NAME }}

      - uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: outputs/

  # ─────────────────────────────
  # Job 3: Deploy
  # ─────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: train

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: outputs
          path: outputs/

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: federated

      - uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/edt-api:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          name: edt-api
          image: ${{ env.IMAGE }}
          dns-name-label: edt-api
          location: japaneast
          ports: 8000
